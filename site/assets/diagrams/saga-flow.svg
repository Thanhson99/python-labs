<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 280" role="img" aria-label="Saga orchestration flow">
  <defs>
    <style>
      .box { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .text { font: 600 18px 'IBM Plex Sans', sans-serif; fill: #4c1d95; }
      .small { font: 500 13px 'IBM Plex Sans', sans-serif; fill: #1f2937; }
      .arrow { stroke: #4c1d95; stroke-width: 3; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#4c1d95"/>
    </marker>
  </defs>
  <rect class="box" x="40" y="95" width="170" height="90"/>
  <text class="text" x="70" y="135">Orchestrator</text>

  <rect class="box" x="280" y="35" width="180" height="80"/>
  <text class="text" x="330" y="80">Inventory</text>
  <text class="small" x="308" y="100">reserve / release</text>

  <rect class="box" x="280" y="165" width="180" height="80"/>
  <text class="text" x="335" y="210">Payment</text>
  <text class="small" x="304" y="230">charge / refund</text>

  <rect class="box" x="560" y="95" width="180" height="90"/>
  <text class="text" x="612" y="135">Shipment</text>

  <rect class="box" x="840" y="95" width="150" height="90"/>
  <text class="text" x="878" y="135">Done</text>

  <line class="arrow" x1="210" y1="120" x2="280" y2="75"/>
  <line class="arrow" x1="210" y1="160" x2="280" y2="205"/>
  <line class="arrow" x1="460" y1="120" x2="560" y2="120"/>
  <line class="arrow" x1="740" y1="120" x2="840" y2="120"/>
</svg>
