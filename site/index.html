<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Labs Learning Hub</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-content">
        <p class="eyebrow">Python Labs</p>
        <h1>Learning Hub: Basic to Advanced</h1>
        <p>
          One site to track what you already built, what to learn next, and how each
          local service fits your roadmap.
        </p>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main>
      <section class="panel">
        <h2>Python Cheat Sheet</h2>
        <div id="cheatsheet" class="grid"></div>
      </section>

      <section class="panel">
        <h2>Roadmap</h2>
        <div id="roadmap" class="timeline"></div>
      </section>

      <section class="panel">
        <h2>Service Catalog</h2>
        <div id="services" class="cards"></div>
      </section>
    </main>

    <footer>
      <span id="generatedAt"></span>
    </footer>

    <script src="assets/app.js"></script>
  </body>
</html>
