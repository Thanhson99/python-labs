<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Question Bank</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body
    class="interview-body"
    data-page="interview-questions"
    data-source="data/interview-basic-questions.json"
    data-registry="data/interview-code-sets.json"
  >
    <header class="hero interview-hero">
      <div class="hero-content">
        <p class="eyebrow">Python Labs</p>
        <h1 id="title">Code Question Bank</h1>
        <p id="subtitle"></p>
        <div class="hero-actions">
          <a class="btn" href="interview.html">Back to code practice</a>
          <a class="btn" href="index.html">Back to track selection</a>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main>
      <section class="panel">
        <h2>Code Question Bank</h2>
        <p class="page-note">
          This page only shows code-related practice sets. Choose answers, check results, and finish the quiz for a final score.
        </p>
        <div class="quiz-summary" id="quizSummary">
          <div class="summary-card">
            <div class="summary-label">Answered</div>
            <div class="summary-value" id="answeredCount">0</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Correct</div>
            <div class="summary-value" id="correctCount">0</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Score</div>
            <div class="summary-value" id="scorePercent">0%</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Rating</div>
            <div class="summary-value" id="scoreRating">Not graded</div>
          </div>
        </div>
        <div class="quiz-toolbar">
          <button class="btn" id="finishQuizBtn" type="button">Finish Quiz</button>
          <button class="btn secondary-btn" id="resetQuizBtn" type="button">Reset Quiz</button>
        </div>
        <div id="questionSetLinks" class="cards compact-cards"></div>
        <div class="search-bar">
          <input
            id="questionSearch"
            class="search-input"
            type="search"
            placeholder="Search code questions, answers, category..."
          />
          <div class="search-meta" id="searchMeta">Showing all questions</div>
        </div>
        <div id="filters" class="filter-bar"></div>
        <div id="questionList" class="question-list"></div>
      </section>
    </main>

    <footer><span id="generatedAt"></span></footer>
    <script src="assets/interview.js"></script>
  </body>
</html>
