<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Labs Study Planner</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="planner" data-source="data/planner.json">
    <header class="hero planner-hero">
      <div class="hero-content">
        <div class="lang-switch top-right" aria-label="Language switcher">
          <button type="button" class="lang-btn active" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="vi">VI</button>
        </div>
        <p class="eyebrow" id="eyebrow">Python Labs</p>
        <h1 id="title">Study Planner</h1>
        <p id="subtitle"></p>
        <div class="hero-actions">
          <a class="btn" id="backButton" href="index.html">Back to track selection</a>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main>
      <section class="panel">
        <h2 id="sectionHighlights">How To Use This Planner</h2>
        <div id="highlights" class="cards compact-cards"></div>
      </section>

      <section class="panel">
        <h2 id="sectionQuickStart">Quick Start</h2>
        <div id="quickStart" class="cards compact-cards"></div>
      </section>

      <section class="panel">
        <h2 id="sectionHabits">Daily Habits</h2>
        <div id="habits" class="cards compact-cards"></div>
      </section>

      <section class="panel">
        <h2 id="sectionPlans">Study Plans</h2>
        <div id="plans" class="timeline"></div>
      </section>

      <section class="panel">
        <h2 id="sectionReview">Weekly Review Questions</h2>
        <div id="reviewQuestions" class="cards compact-cards"></div>
      </section>
    </main>

    <footer><span id="generatedAt"></span></footer>
    <script src="assets/site.js"></script>
    <script src="assets/planner.js"></script>
  </body>
</html>
